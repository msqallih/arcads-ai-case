version: 2

sources:
  - name: arcads_product
    description: "Product database tables from Arcads application"
    database: data-analysis-test
    schema: public
    tables:
      - name: Users
        description: "User accounts in the Arcads platform"
        columns:
          - name: id
            description: "Primary key for users"
          - name: email
            description: "User email address"
          - name: firstName
            description: "User first name"
          - name: lastName
            description: "User last name"
          - name: createdAt
            description: "Timestamp when user was created"
          - name: updatedAt
            description: "Timestamp when user was last updated"

      - name: Workspaces
        description: "Workspaces associated with users, contains subscription and credit information"
        columns:
          - name: id
            description: "Primary key for workspaces"
          - name: userId
            description: "Foreign key to Users table"
          - name: plan
            description: "Current plan name (STARTER, BASIC/CREATOR, PRO, CUSTOM)"
          - name: stripeEndCurrentPeriod
            description: "End date of current subscription period"
          - name: totalCredits
            description: "Total credits available in current period"
          - name: usedCredits
            description: "Credits used in current period"

      - name: Accesses
        description: "User access to workspaces (for invited users)"
        columns:
          - name: id
            description: "Primary key for accesses"
          - name: userId
            description: "Foreign key to Users table"
          - name: workspaceId
            description: "Foreign key to Workspaces table"

      - name: Plans
        description: "Available subscription plans"
        columns:
          - name: type
            description: "Plan type (used as primary key)"
          - name: credits
            description: "Number of credits included in the plan"
          - name: isPro
            description: "Boolean indicating if this is a pro plan"

      - name: WorkspacesABTests
        description: "Association between workspaces and AB tests"
        columns:
          - name: id
            description: "Primary key"
          - name: workspaceId
            description: "Foreign key to Workspaces table"
          - name: feature
            description: "Name of the AB test feature"
          - name: cohort
            description: "Cohort assignment (A or B)"

      - name: UsersABTests
        description: "Association between users and AB tests"
        columns:
          - name: id
            description: "Primary key"
          - name: userId
            description: "Foreign key to Users table"
          - name: feature
            description: "Name of the AB test feature"
          - name: cohort
            description: "Cohort assignment (A or B)"

      - name: StripeSubscriptionHistories
        description: "History of all subscription changes"
        columns:
          - name: id
            description: "Primary key"
          - name: workspaceId
            description: "Foreign key to Workspaces table"
          - name: plan
            description: "Plan name"
          - name: interval
            description: "Billing interval (month or year)"
          - name: intervalCount
            description: "Number of intervals (usually 1)"
          - name: startDate
            description: "Start date of this subscription"
          - name: endDate
            description: "End date of this subscription (null if current)"

      - name: StripePaymentHistories
        description: "History of all payments"
        columns:
          - name: id
            description: "Primary key"
          - name: stripeSubscriptionHistoryId
            description: "Foreign key to StripeSubscriptionHistories table"
          - name: type
            description: "Payment type (plan or additional credits)"
          - name: date
            description: "Date of payment"
          - name: currency
            description: "Payment currency"
          - name: currencyAmount
            description: "Payment amount in original currency"
          - name: eurAmount
            description: "Payment amount in EUR"
          - name: credits
            description: "Credits purchased"
          - name: additionalCredits
            description: "Additional credits included"
          - name: refundedAmount
            description: "Refunded amount in original currency"
          - name: eurRefundedAmount
            description: "Refunded amount in EUR"

      - name: CreditsConsumptionEvents
        description: "Credits consumption and refund events"
        columns:
          - name: id
            description: "Primary key"
          - name: workspaceId
            description: "Foreign key to Workspaces table"
          - name: userId
            description: "Foreign key to Users table"
          - name: feature
            description: "Feature that consumed credits"
          - name: occurredAt
            description: "Timestamp when event occurred"
          - name: generations
            description: "Number of generations"
          - name: creditsCost
            description: "Credits cost"

      - name: Videos
        description: "Video generations (Arcads 1.0)"
        columns:
          - name: id
            description: "Primary key"
          - name: scriptId
            description: "Foreign key to Scripts table"
          - name: videoStatus
            description: "Video status"

      - name: VideoAssets
        description: "All other generations (images, videos)"
        columns:
          - name: id
            description: "Primary key"
          - name: type
            description: "Asset type"
          - name: status
            description: "Asset status"
          - name: productId
            description: "Foreign key to Products table"

      - name: Costs
        description: "Cost of each generation"
        columns:
          - name: id
            description: "Primary key"
          - name: type
            description: "Cost type"
          - name: entityId
            description: "Foreign key to entity (video or asset)"
          - name: workspaceId
            description: "Foreign key to Workspaces table"
          - name: value
            description: "Cost value"

      - name: Scripts
        description: "Video scripts created by users"
        columns:
          - name: id
            description: "Primary key"
          - name: name
            description: "Script name"
          - name: projectId
            description: "Foreign key to Projects table"

      - name: Projects
        description: "User projects for organizing videos"
        columns:
          - name: id
            description: "Primary key"
          - name: name
            description: "Project name"
          - name: folderId
            description: "Foreign key to Folders table"

      - name: Folders
        description: "User folders for organizing projects"
        columns:
          - name: id
            description: "Primary key"
          - name: name
            description: "Folder name"
          - name: productId
            description: "Foreign key to Products table"

      - name: Products
        description: "User products for video generation"
        columns:
          - name: id
            description: "Primary key"
          - name: name
            description: "Product name"
          - name: workspaceId
            description: "Foreign key to Workspaces table"

      - name: UsedCredits
        description: "Tracks credits used per script and workspace"
        columns:
          - name: id
            description: "Primary key"
          - name: scriptId
            description: "Foreign key to Scripts table"
          - name: workspaceId
            description: "Foreign key to Workspaces table"
          - name: usedCredits
            description: "Credits used"
          - name: monthlyWorkspaceUsedCredits
            description: "Monthly workspace used credits"
          - name: createdAt
            description: "Timestamp when record was created"
          - name: updatedAt
            description: "Timestamp when record was updated"
