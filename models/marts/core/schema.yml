version: 2

models:
  - name: fct_ab_test_paywall
    description: "Fact table for paywall AB test analysis containing conversion and revenue metrics"
    columns:
      - name: workspace_id
        description: "Primary key - workspace identifier"
        tests:
          - unique
          - not_null
      - name: ab_test_name
        description: "Name of the AB test"
      - name: cohort
        description: "Test cohort (A = control, B = variant)"
      - name: test_label
        description: "Human-readable test name"
      - name: ab_test_assigned_at
        description: "When workspace was assigned to the test"
      - name: plan_name
        description: "Plan selected at first subscription"
      - name: billing_interval
        description: "Billing interval selected (month or year)"
      - name: first_payment_amount
        description: "Amount of first payment"
      - name: first_payment_date
        description: "Date of first payment"
      - name: is_during_test_period
        description: "Boolean indicating if subscription occurred during test period"
      - name: converted_to_paid
        description: "Boolean indicating if workspace converted to paid"
      - name: has_renewed
        description: "Boolean indicating if workspace has renewed subscription"
      - name: lifetime_value
        description: "Total revenue from this workspace"
      - name: profit
        description: "Revenue minus generation costs"
      - name: days_to_conversion
        description: "Days from test assignment to first payment"
      - name: total_revenue
        description: "Total revenue from all payments"
      - name: total_plan_revenue
        description: "Revenue from plan subscriptions only"
      - name: total_additional_credits_revenue
        description: "Revenue from additional credit purchases"
      - name: total_payments
        description: "Total number of payments"
      - name: total_credits_consumed
        description: "Total credits consumed"
      - name: total_generations
        description: "Total content generations"
      - name: total_generation_cost
        description: "Total cost of generations"
      - name: has_generated_content
        description: "Boolean indicating if workspace has generated content"

  - name: fct_ab_test_analysis
    description: "Aggregated AB test results by test and cohort with statistical metrics"
    columns:
      - name: test_label
        description: "Human-readable test name (e.g., '10% Discount Test')"
      - name: ab_test_name
        description: "Technical test identifier"
      - name: cohort
        description: "Test cohort (A = control, B = variant)"
      - name: total_workspaces
        description: "Total number of workspaces in this cohort"
      - name: conversions
        description: "Number of workspaces that converted to paid"
      - name: conversion_rate
        description: "Percentage of workspaces that converted"
      - name: total_first_payment_revenue
        description: "Sum of all first payments"
      - name: avg_first_payment_amount
        description: "Average first payment amount"
      - name: total_lifetime_value
        description: "Sum of all lifetime values"
      - name: avg_lifetime_value
        description: "Average lifetime value per workspace"
      - name: total_profit
        description: "Total profit (revenue - costs)"
      - name: avg_profit_per_workspace
        description: "Average profit per workspace"
      - name: starter_monthly
        description: "Count of Starter monthly plan subscriptions"
      - name: creator_monthly
        description: "Count of Creator (Basic) monthly plan subscriptions"
      - name: pro_monthly
        description: "Count of Pro monthly plan subscriptions"
      - name: yearly_plans
        description: "Count of yearly plan subscriptions"
      - name: workspaces_with_content
        description: "Number of workspaces that generated content"
      - name: total_content_generated
        description: "Total number of content generations"
      - name: avg_generations_per_workspace
        description: "Average generations per workspace"
      - name: renewed_subscriptions
        description: "Number of subscriptions that renewed"
      - name: renewal_rate
        description: "Percentage of paid subscriptions that renewed"
